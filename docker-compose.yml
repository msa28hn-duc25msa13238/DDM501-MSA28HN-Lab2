x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: docker/airflow/Dockerfile
  image: ddm501-lab2-airflow:2.8.0
  user: "${AIRFLOW_UID:-50000}:0"
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: q2AiZMZ5RWPon_fiyTpCtT5EBlCdbgbfvzEUcFeldvs=
    AIRFLOW__WEBSERVER__SECRET_KEY: ddm501-lab2-airflow-secret
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session
    MLFLOW_TRACKING_URI: http://mlflow:5019
    PYTHONPATH: /opt/airflow
  volumes: &airflow-common-volumes
    - ./dags:/opt/airflow/dags
    - ./pipeline:/opt/airflow/pipeline
    - ./data:/opt/airflow/data
    - ./models:/opt/airflow/models
    - ./artifacts:/opt/airflow/artifacts
    - ./logs:/opt/airflow/logs
  depends_on: &airflow-common-depends-on
    postgres:
      condition: service_healthy
    airflow-init:
      condition: service_completed_successfully

services:
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.9.2
    container_name: mlflow-server
    ports:
      - "5019:5019"
    volumes:
      - ./mlruns:/mlflow/mlruns
      - mlflow_db:/mlflow/db
    environment:
      MLFLOW_TRACKING_URI: http://localhost:5019
      MLFLOW_BACKEND_STORE_URI: sqlite:////mlflow/db/mlflow.db
      MLFLOW_ARTIFACT_ROOT: /mlflow/mlruns
    command: >
      sh -c "
        mlflow server
        --backend-store-uri $$MLFLOW_BACKEND_STORE_URI
        --default-artifact-root $$MLFLOW_ARTIFACT_ROOT
        --host 0.0.0.0
        --port 5019
      "
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5019')"]
      interval: 20s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: airflow-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
    restart: unless-stopped

  airflow-webserver:
    <<: *airflow-common
    container_name: airflow-webserver
    ports:
      - "8081:8080"
    command: webserver
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    command: scheduler
    restart: unless-stopped

  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      bash -c "
        airflow db migrate &&
        airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com || true
      "
    restart: "no"

  ml-pipeline:
    image: python:3.11
    container_name: ml-pipeline
    profiles:
      - manual
    working_dir: /app
    volumes:
      - .:/app
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5019
    depends_on:
      mlflow:
        condition: service_healthy
    command: >
      bash -c "
        pip install --no-cache-dir -r requirements.txt &&
        python -m pipeline.run_pipeline
      "

volumes:
  postgres_data:
  mlflow_db:
